<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Similarity Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <div id="dashboard-app" class="mx-auto grid min-h-screen max-w-[1800px] grid-cols-1 gap-4 p-4 lg:grid-cols-[18rem_1fr_22rem]">
      <aside class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <h1 class="text-lg font-semibold">Dataset Controls</h1>
        <div class="mt-4 space-y-4">
          <label class="block text-sm font-medium text-slate-700" for="dashboard-search">Search</label>
          <input id="dashboard-search" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm" placeholder="Search name, path, group">
          <label class="block text-sm font-medium text-slate-700" for="dashboard-sort">Sort</label>
          <select id="dashboard-sort" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm">
            <option value="name_asc">Name (A → Z)</option>
            <option value="group_size_desc">Group size (high → low)</option>
          </select>
          <label class="block text-sm font-medium text-slate-700" for="dashboard-min-group-size">Minimum group size</label>
          <input id="dashboard-min-group-size" type="number" min="1" step="1" value="1" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm">
          <label class="flex items-center gap-2 text-sm text-slate-700" for="dashboard-hide-noise">
            <input id="dashboard-hide-noise" type="checkbox" checked>
            Hide noise
          </label>
        </div>
      </aside>
      <main class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <section id="dashboard-warning" class="mb-4 hidden rounded-lg border border-amber-300 bg-amber-50 p-3 text-sm text-amber-800"></section>
        <section id="dashboard-summary" class="mb-4 rounded-lg border border-slate-200 bg-slate-50 p-3 text-sm text-slate-700"></section>
        <section class="mb-4 flex flex-wrap gap-2">
          <button id="stage-tab-stage1_same_source" data-stage="stage1_same_source" class="rounded-md border border-slate-300 px-3 py-1.5 text-sm font-medium">Stage 1: Same Source</button>
          <button id="stage-tab-stage2_action_clusters" data-stage="stage2_action_clusters" class="rounded-md border border-slate-300 px-3 py-1.5 text-sm font-medium">Stage 2: Action Clusters</button>
        </section>
        <section id="dashboard-grid" class="grid max-h-[70vh] grid-cols-2 gap-3 overflow-y-auto pr-1 md:grid-cols-3 xl:grid-cols-4"></section>
        <section id="dashboard-empty-state" class="mt-4 hidden rounded-lg border border-dashed border-slate-300 bg-slate-50 p-4 text-sm text-slate-600"></section>
      </main>
      <aside id="selected-preview" class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <h2 class="text-base font-semibold">Selected Item</h2>
        <p class="mt-2 text-sm text-slate-600">Choose a card to inspect details.</p>
      </aside>
    </div>
    <script src="./dashboard.js"></script>
  </body>
</html>
